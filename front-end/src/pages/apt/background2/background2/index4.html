<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wet Paper Effect</title>
    <link rel="stylesheet" href="style4.css">
</head>
<body>
    <div class="paper-container">
        <div class="stain" style="top: 20%; left: 30%; animation-delay: 0s;"></div>
        <div class="stain" style="top: 50%; left: 60%; animation-delay: 1.5s;"></div>
        <div class="stain" style="top: 80%; left: 10%; animation-delay: 3s;"></div>
        <div class="stain" style="top: 10%; left: 80%; animation-delay: 4.5s;"></div>
        <div class="stain" style="top: 40%; left: 45%; animation-delay: 6s;"></div>
    </div>
</body>
</html>
