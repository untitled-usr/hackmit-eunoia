<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Animation</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="background"></div>
    <svg xmlns="http://www.w3.org/2000/svg" version="1.1" style="display: none">
        <defs>
            <filter id="wave-effect">
                <feTurbulence type="fractalNoise" baseFrequency="0.02 0.08" numOctaves="3" result="noise">
                    <animate attributeName="baseFrequency" values="0.02 0.08;0.03 0.1;0.02 0.08" dur="10s" repeatCount="indefinite" />
                </feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>
</body>
</html>
