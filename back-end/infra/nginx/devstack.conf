map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream openwebui_frontend {
    server 127.0.0.1:7923;
}

upstream openwebui_backend {
    server 127.0.0.1:7920;
}

upstream memos_frontend {
    server 127.0.0.1:7924;
}

upstream vocechat_backend {
    server 127.0.0.1:7922;
}

upstream mid_auth_backend {
    server 127.0.0.1:19000;
}

server {
    listen 80;
    server_name owui.dev.local;
    client_max_body_size 100m;

    location / {
        # dev default: proxy to frontend hot-reload server
        proxy_pass http://openwebui_frontend;
        # switch to backend integrated serving when needed:
        # proxy_pass http://openwebui_backend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name memos.dev.local;
    client_max_body_size 100m;

    location / {
        proxy_pass http://memos_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name chat.dev.local;
    client_max_body_size 200m;

    location / {
        proxy_pass http://vocechat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name api.dev.local;
    client_max_body_size 20m;

    location / {
        proxy_pass http://mid_auth_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }
}
