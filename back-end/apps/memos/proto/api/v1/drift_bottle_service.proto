syntax = "proto3";

package memos.api.v1;

import "api/v1/attachment_service.proto";
import "api/v1/memo_service.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "gen/api/v1";

// DriftBottleService provides isolated APIs for the drift-bottle feature.
// It reuses memo/attachment storage but keeps a dedicated API surface.
service DriftBottleService {
  // CreateDriftBottle creates a new drift bottle.
  rpc CreateDriftBottle(CreateDriftBottleRequest) returns (DriftBottle) {
    option (google.api.http) = {
      post: "/api/v1/drift-bottles"
      body: "*"
    };
    option (google.api.method_signature) = "content";
  }

  // GetDriftBottle returns a drift bottle by name.
  rpc GetDriftBottle(GetDriftBottleRequest) returns (DriftBottle) {
    option (google.api.http) = {get: "/api/v1/{name=drift-bottles/*}"};
    option (google.api.method_signature) = "name";
  }

  // PickDriftBottle picks one drift bottle from current user's candidate pool.
  rpc PickDriftBottle(PickDriftBottleRequest) returns (PickDriftBottleResponse) {
    option (google.api.http) = {
      post: "/api/v1/drift-bottles:pick"
      body: "*"
    };
    option (google.api.method_signature) = "";
  }

  // RefreshMyDriftBottleCandidates refreshes current user's candidate pool.
  rpc RefreshMyDriftBottleCandidates(RefreshMyDriftBottleCandidatesRequest) returns (RefreshMyDriftBottleCandidatesResponse) {
    option (google.api.http) = {
      post: "/api/v1/drift-bottles:refreshMine"
      body: "*"
    };
    option (google.api.method_signature) = "";
  }

  // SearchDriftBottles searches drift bottles by tag.
  rpc SearchDriftBottles(SearchDriftBottlesRequest) returns (SearchDriftBottlesResponse) {
    option (google.api.http) = {get: "/api/v1/drift-bottles:search"};
    option (google.api.method_signature) = "tag";
  }

  // ReplyDriftBottle creates a memo comment on the drift bottle.
  rpc ReplyDriftBottle(ReplyDriftBottleRequest) returns (Memo) {
    option (google.api.http) = {
      post: "/api/v1/{name=drift-bottles/*}:reply"
      body: "*"
    };
    option (google.api.method_signature) = "name,content";
  }
}

message DriftBottle {
  option (google.api.resource) = {
    type: "memos.api.v1/DriftBottle"
    pattern: "drift-bottles/{drift_bottle}"
    name_field: "name"
    singular: "driftBottle"
    plural: "driftBottles"
  };

  // The resource name of the drift bottle.
  // Format: drift-bottles/{drift_bottle}
  string name = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IDENTIFIER
  ];

  // Output only. Backing memo resource name.
  // Format: memos/{memo}
  string memo = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "memos.api.v1/Memo"}
  ];

  // Output only. Creator resource name.
  // Format: users/{user}
  string creator = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "memos.api.v1/User"}
  ];

  // Output only. Current state of this drift bottle.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The latest computed matching score for current user context.
  double score = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Projection of the underlying memo for caller convenience.
  Memo memo_info = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Tags attached to this drift bottle.
  repeated string tags = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The creation timestamp.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The last update timestamp.
  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  enum State {
    STATE_UNSPECIFIED = 0;
    ACTIVE = 1;
    ARCHIVED = 2;
  }
}

message CreateDriftBottleRequest {
  // Required. Markdown content for the drift bottle.
  string content = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. Attachments for the backing memo.
  repeated Attachment attachments = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. User provided drift bottle id.
  string drift_bottle_id = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. User defined tags.
  repeated string tags = 4 [(google.api.field_behavior) = OPTIONAL];
}

message GetDriftBottleRequest {
  // Required. The resource name of the drift bottle.
  // Format: drift-bottles/{drift_bottle}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "memos.api.v1/DriftBottle"}
  ];
}

message PickDriftBottleRequest {}

message PickDriftBottleResponse {
  // The picked drift bottle.
  DriftBottle drift_bottle = 1;
  // Remaining picks for today.
  int32 remaining_picks = 2;
}

message RefreshMyDriftBottleCandidatesRequest {}

message RefreshMyDriftBottleCandidatesResponse {
  int32 refreshed_count = 1;
}

message SearchDriftBottlesRequest {
  // Required. Tag keyword to search.
  string tag = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. Max results to return.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Opaque pagination token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

message SearchDriftBottlesResponse {
  repeated DriftBottle drift_bottles = 1;
  string next_page_token = 2;
}

message ReplyDriftBottleRequest {
  // Required. The resource name of the drift bottle.
  // Format: drift-bottles/{drift_bottle}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "memos.api.v1/DriftBottle"}
  ];

  // Required. Reply content.
  string content = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional. The comment ID to use.
  string comment_id = 3 [(google.api.field_behavior) = OPTIONAL];
}
