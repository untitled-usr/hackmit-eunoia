                    description: List of user webhooks.
            description: User webhooks configuration.
        UserStats:
            type: object
            properties:
                name:
                    type: string
                    description: |-
                        The resource name of the user whose stats these are.
                         Format: users/{user}
                memoDisplayTimestamps:
                    type: array
                    items:
                        type: string
                        format: date-time
                    description: The timestamps when the memos were displayed.
                memoTypeStats:
                    allOf:
                        - $ref: '#/components/schemas/UserStats_MemoTypeStats'
                    description: The stats of memo types.
                tagCount:
                    type: object
                    additionalProperties:
                        type: integer
                        format: int32
                    description: The count of tags.
                pinnedMemos:
                    type: array
                    items:
                        type: string
                    description: The pinned memos of the user.
                totalMemoCount:
                    type: integer
                    description: Total memo count.
                    format: int32
            description: User statistics messages
        UserStats_MemoTypeStats:
            type: object
            properties:
                linkCount:
                    type: integer
                    format: int32
                codeCount:
                    type: integer
                    format: int32
                todoCount:
                    type: integer
                    format: int32
                undoCount:
                    type: integer
                    format: int32
            description: Memo type statistics.
        UserWebhook:
            type: object
            properties:
                name:
                    type: string
                    description: |-
                        The name of the webhook.
                         Format: users/{user}/webhooks/{webhook}
                url:
                    type: string
                    description: The URL to send the webhook to.
                displayName:
                    type: string
                    description: Optional. Human-readable name for the webhook.
                createTime:
                    readOnly: true
                    type: string
                    description: The creation time of the webhook.
                    format: date-time
                updateTime:
                    readOnly: true
                    type: string
                    description: The last update time of the webhook.
                    format: date-time
            description: UserWebhook represents a webhook owned by a user.
tags:
    - name: AttachmentService
      description: |-
        AttachmentService manages attachment CRUD operations.
         Fork: see common.proto package comment. Binary bytes are served via GET /file/attachments/... (fileserver), not gRPC body payloads.
    - name: DriftBottleService
      description: |-
        DriftBottleService provides isolated APIs for the drift-bottle feature.
         It reuses memo/attachment storage but keeps a dedicated API surface.
    - name: IdentityProviderService
      description: |-
        IdentityProviderService manages SSO identity provider configuration (admin CRUD).
         Fork: see common.proto package comment. ListIdentityProviders is public; mutations require admin + X-Acting-Uid.
         This fork does not expose AuthService; end-user OIDC/password login flows are not the primary API auth mechanism.
    - name: InstanceService
      description: |-
        InstanceService manages instance profile and instance settings.
         Fork: see common.proto package comment for X-Acting-Uid vs public RPCs (acl_config.go).
         GetInstanceSetting is public in the gateway sense, but STORAGE settings still require admin + valid X-Acting-Uid in the service layer.
    - name: MemoService
      description: |-
        MemoService manages memo CRUD, comments, relations, and reactions.
         Fork: see common.proto package comment. Writes require a valid X-Acting-Uid; reads follow visibility rules.
    - name: ShortcutService
      description: |-
        ShortcutService manages per-user saved shortcut filters.
         Fork: see common.proto package comment. All shortcut RPCs require a valid X-Acting-Uid.
    - name: UserService
      description: |-
        UserService manages users, user settings, webhooks, and inbox.
         Fork: see common.proto package comment. CreateUser is public USER registration (body may be {}); password is not used for login.
         The sole ADMIN is users/1 (username "admin"), ensured after DB migrate — CreateUser never creates ADMIN.
